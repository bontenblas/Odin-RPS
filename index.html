<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Rock Paper Scissors!</title>
</head>
<body>

    <button id="rock">Rock</button>
    <button id="paper">Paper</button>
    <button id="scissors">Scissors</button>
    <p id="scoreBoard"></p>

    <div id="rounds"></div>
    <p id="winner" style="font-size: 24px;"></p>

    

    <script>
        function getComputerChoice() {
            let cpuChoice = Math.floor(Math.random() * 3)
            if (cpuChoice === 0) {
                return 'Rock'
            } else if (cpuChoice === 1) {
                return 'Paper'
            } else {
                return 'Scissors'
            }
        }

        // function getHumanChoice(choice) {
        //     let playerChoice = prompt("Rock, Paper, or Scissors")
        //     return playerChoice
        // }

        function playGame(human, computer) {
            function playRound(playerChoice, cpuChoice) {  
                let player = playerChoice.toLowerCase()
                let cpu = cpuChoice.toLowerCase()
                
                if (player === cpu) {
                    console.log('tie')
                    return 'Tie'
                } else if ((player == 'rock' && cpu == 'scissors') ||
                            (player == 'paper' && cpu == 'rock') ||
                            (player == 'scissors' && cpu == 'paper')) {
                    console.log('win')
                    return 'Win'
                } else {
                    console.log('lose')
                    return 'Lose'
                }
            }

            function checkWinner(player, cpu) {
                const buttons = document.querySelectorAll("button")
                if (player === 5) {
                    sayWinner.textContent = "Player Wins!"
                    buttons.forEach(btn => btn.disabled = true)
                } if (cpu === 5) {
                    sayWinner.textContent = "CPU Wins..."
                    buttons.forEach(btn => btn.disabled = true)
                }
            }
        
            
            const container = document.querySelector('body')
            const rockBtn = document.querySelector('#rock')
            const paperBtn = document.querySelector('#paper')
            const scissorsBtn = document.querySelector('#scissors')
            const results = document.querySelector('#rounds')
            const score = document.querySelector("#scoreBoard")
            const sayWinner = document.querySelector("#winner")
            container.append(rockBtn)
            container.append(paperBtn)
            container.append(scissorsBtn)
            container.append(score)
            container.append(results)
            container.append(sayWinner)

            let cpuScore = 0;
            let playerScore = 0;

            score.textContent = `Player: 0 | CPU: 0`

            

            rockBtn.addEventListener('click', () => {
                const showResult = document.createElement("p")
                const player = 'Rock'
                const cpu = getComputerChoice()
                const roundResult = playRound(player, cpu)

                if (roundResult.toLowerCase() === 'win') {
                    showResult.textContent = `${roundResult}! ${player} beats ${cpu}!`
                    results.appendChild(showResult)
                    playerScore += 1
                    score.textContent = `Player: ${playerScore} | CPU: ${cpuScore}`
                    checkWinner(playerScore, cpuScore)
                }

                if (roundResult.toLowerCase() === 'lose') {
                    showResult.textContent = `${roundResult}. ${cpu} beats ${player}...`
                    results.appendChild(showResult)
                    cpuScore += 1
                    score.textContent = `Player: ${playerScore} | CPU: ${cpuScore}`
                    checkWinner(playerScore, cpuScore)
                }

                if (roundResult.toLowerCase() === 'tie') {
                    showResult.textContent = "It's a tie!"
                    results.appendChild(showResult)
                }

            })

            paperBtn.addEventListener('click', () => {
                const showResult = document.createElement("p")
                const player = 'Paper'
                const cpu = getComputerChoice()
                const roundResult = playRound(player, cpu)

                if (roundResult.toLowerCase() === 'win') {
                    showResult.textContent = `${roundResult}! ${player} beats ${cpu}!`
                    results.appendChild(showResult)
                    playerScore += 1
                    score.textContent = `Player: ${playerScore} | CPU: ${cpuScore}`
                    checkWinner(playerScore, cpuScore)
                }

                if (roundResult.toLowerCase() === 'lose') {
                    showResult.textContent = `${roundResult}! ${player} beats ${cpu}!`
                    results.appendChild(showResult)
                    cpuScore += 1
                    score.textContent = `Player: ${playerScore} | CPU: ${cpuScore}`
                    checkWinner(playerScore, cpuScore)
                }

                if (roundResult.toLowerCase() === 'tie') {
                    showResult.textContent = "It's a tie!"
                    results.appendChild(showResult)
                }
            })

            scissorsBtn.addEventListener('click', () => {
                const showResult = document.createElement("p")
                const player = 'Scissors'
                const cpu = getComputerChoice()
                const roundResult = playRound(player, cpu)

                if (roundResult.toLowerCase() === 'win') {
                    showResult.textContent = `${roundResult}! ${player} beats ${cpu}!`
                    results.appendChild(showResult)
                    playerScore += 1
                    score.textContent = `Player: ${playerScore} | CPU: ${cpuScore}`
                    checkWinner(playerScore, cpuScore)
                }

                if (roundResult.toLowerCase() === 'lose') {
                    showResult.textContent = `${roundResult}! ${player} beats ${cpu}!`
                    results.appendChild(showResult)
                    cpuScore += 1
                    score.textContent = `Player: ${playerScore} | CPU: ${cpuScore}`
                    checkWinner(playerScore, cpuScore)
                }

                if (roundResult.toLowerCase() === 'tie') {
                    showResult.textContent = "It's a tie!"
                    results.appendChild(showResult)
                }
            })
        }    
        playGame()
    </script>
</body>
</html>
