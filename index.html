<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Rock Paper Scissors!</title>
</head>
<body>
    <script>
        function getComputerChoice() {
            let cpuChoice = Math.floor(Math.random() * 3)
            if (cpuChoice === 0) {
                return 'Rock'
            } else if (cpuChoice === 1) {
                return 'Paper'
            } else {
                return 'Scissors'
            }
        }

        function getHumanChoice(choice) {
            let playerChoice = prompt("Rock, Paper, or Scissors")
            return playerChoice
        }

        function playGame(human, computer) {
            function playRound(playerChoice, cpuChoice) {  
                let player = playerChoice.toLowerCase()
                let cpu = cpuChoice.toLowerCase()
                
                if (player === cpu) {
                    return 'tie'
                } else if ((player == 'rock' && cpu == 'scissors') ||
                            (player == 'paper' && cpu == 'rock') ||
                            (player == 'scissors' && cpu == 'paper')) {
                    return 'win'
                } else {
                    return 'lose'
                }
            }            
            
            // score
            let humanScore = 0;
            let computerScore = 0;

            for (let i = 0; i < 7; i++) {
                // get choice
                let humanChoice = getHumanChoice();
                let computerChoice = getComputerChoice();

                let result = playRound(humanChoice, computerChoice);

                if (result === 'win') humanScore++
                if (result === 'lose') computerScore++
                
                console.log(result)
                console.log(`Human: ${humanScore}, Computer: ${computerScore}`) 
                if (humanScore === 4 || computerScore === 4) break  
            }

            if (humanScore > computerScore) console.log('Human wins!')
            if (computerScore > humanScore) console.log('Computer wins...')
            if (computerScore == humanScore) console.log('Its a tie!')
        }

        playGame()
    </script>
</body>
</html>
